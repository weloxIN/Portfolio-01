name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker compose build
      - name: CI_encrypt
        run: echo "Token is hidden, length is ${#CI_CD_BUILD}"
        env:
          CI_CD_BUILD: ${{ secrets.CI_CD_BUILD }}
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Push to Docker Hub
        run: |
          docker images
          docker tag $(docker images --format '{{.Repository}}:{{.Tag}}' | head -1) ${{ secrets.DOCKER_USERNAME }}/soft-osint:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/soft-osint:latest
